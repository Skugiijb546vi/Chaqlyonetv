name: ئامرازی پاتچکردنی خۆم 🚬

on:
  workflow_dispatch:

jobs:
  patch-it:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: هێنانی فایلەکان
        uses: actions/checkout@v4

      - name: دانانی پایتۆن
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: دانانی جاڤا
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: دابەزاندنی شتەکان
        run: |
          pip install reflutter
          wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O signer.jar

      - name: هێنانی ئەپەکە
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --pattern 'app.apk'

      - name: شکاندنی سیکیوریتی
        run: |
          echo -e "1\n127.0.0.1\n" | reflutter app.apk
          
      - name: واژۆکردن
        run: |
          java -jar signer.jar -a *RE*.apk --allowResign -o final-output
          
      - name: بەرزکردنەوەی فایلی تەواوکراو
        uses: actions/upload-artifact@v4
        with:
          name: App-Tawaw-Kraw
          path: final-output/*.apk
